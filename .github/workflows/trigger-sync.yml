name: Trigger Algorithm Sync

on:
  push:
    branches:
      - main

jobs:
  dispatch:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Algorithm Repo
        run: |
          curl -X POST \
          -H "Authorization: Bearer ${{ secrets.REPO_PAT }}" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/hanjaek/Algorithm/dispatches \
          -d '{"event_type":"sync-codetree"}'
