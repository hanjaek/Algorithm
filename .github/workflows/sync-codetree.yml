name: Sync Codetree Subtree

on:
  repository_dispatch:
    types: [sync-codetree]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Algorithm repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Git config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add/Update codetree remote (supports private)
        run: |
          # 기존 remote가 있으면 토큰 URL로 강제 갱신
          if git remote get-url codetree > /dev/null 2>&1; then
            git remote set-url codetree https://x-access-token:${{ secrets.CODETREE_FETCH_TOKEN }}@github.com/hanjaek/Codetree.git
          else
            git remote add codetree https://x-access-token:${{ secrets.CODETREE_FETCH_TOKEN }}@github.com/hanjaek/Codetree.git
          fi
          git fetch codetree main

      - name: Pull codetree subtree (squash)
        run: |
          git subtree pull --prefix=Codetree codetree main --squash -m "auto sync Codetree" || echo "No changes"

      - name: Push updates to Algorithm
        run: |
          git push origin HEAD:main || echo "Nothing to push"