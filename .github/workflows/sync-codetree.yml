name: Sync Codetree Subtree

on:
  repository_dispatch:
    types: [sync-codetree]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Algorithm repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Git config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Force set codetree remote (private supported)
        run: |
          set -e
          echo "Secret length: ${#CODETREE_FETCH_TOKEN}"
          git remote remove codetree 2>/dev/null || true
          git remote add codetree https://x-access-token:${CODETREE_FETCH_TOKEN}@github.com/hanjaek/Codetree.git
          git remote -v
          git fetch codetree main
        env:
          CODETREE_FETCH_TOKEN: ${{ secrets.CODETREE_FETCH_TOKEN }}

      - name: Pull codetree subtree
        run: |
          git subtree pull --prefix=Codetree codetree main --squash -m "auto sync Codetree" || echo "No changes"

      - name: Push to Algorithm
        run: |
          git push origin HEAD:main || echo "Nothing to push"